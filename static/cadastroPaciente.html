<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AURA | Cadastro de Paciente</title>

    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/listaPaciente.css" />
    <link rel="stylesheet" href="css/cadastroPaciente.css" />

    <link rel="icon" href="favicon.ico" />
  </head>

  <body>
    <header>
      <a href="index.html" class="header-brand" title="Ir para home">
        <div class="logo-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M6 3c0 4 12 3 12 9S6 18 6 21M18 3C18 7 6 6 6 12s12 6 12 9"
              stroke="white"
              stroke-width="2.2"
              stroke-linecap="round"
              fill="none"
            />
          </svg>
        </div>
        <span class="logo-text">AURA</span>
      </a>

      <div class="header-right">
        <span class="header-sub">Instituto Buko Kaesemodel</span>
        <div class="header-user">
          <div class="user-avatar" aria-hidden="true">DR</div>
          <div class="user-info">
            <span class="user-name">Dr. Lionel Aura</span>
            <span class="user-role">Profissional de Saúde</span>
          </div>
        </div>
        <button class="btn-logout" id="btnLogout" aria-label="Encerrar sessão">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
            <polyline points="16 17 21 12 16 7" />
            <line x1="21" y1="12" x2="9" y2="12" />
          </svg>
          Sair
        </button>
      </div>
    </header>

    <div
      class="session-banner"
      id="sessionBanner"
      role="alert"
      aria-live="assertive"
    >
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </svg>
      <span
        >Sua sessão expira em <strong id="sessionCountdown">2:00</strong>. Deseja
        continuar?</span
      >
      <button class="btn-session-keep" id="btnKeepSession">
        Continuar sessão
      </button>
    </div>

    <main>
      <div class="page-wrapper">
        <div class="section-header">
          <div>
            <h2 class="section-title" id="pageTitle">Novo Paciente</h2>
            <p class="section-sub" id="pageSubtitle">
              Preencha os dados cadastrais do paciente
            </p>
          </div>
        </div>

        <div class="stepper" aria-label="Etapas do cadastro">
          <div class="stepper-item is-active" id="stepper-1" role="button" tabindex="0" aria-controls="step-1" aria-current="step">
            <span class="stepper-dot" aria-hidden="true">1</span>
            <span class="stepper-text">
              <span class="stepper-title">Paciente</span>
              <span class="stepper-sub">Identificação</span>
            </span>
          </div>
          <div class="stepper-item" id="stepper-2" role="button" tabindex="0" aria-controls="step-2">
            <span class="stepper-dot" aria-hidden="true">2</span>
            <span class="stepper-text">
              <span class="stepper-title">Responsável</span>
              <span class="stepper-sub">Vínculo e CPF</span>
            </span>
          </div>
          <div class="stepper-item" id="stepper-3" role="button" tabindex="0" aria-controls="step-3">
            <span class="stepper-dot" aria-hidden="true">3</span>
            <span class="stepper-text">
              <span class="stepper-title">Endereço</span>
              <span class="stepper-sub">Localização</span>
            </span>
          </div>
        </div>

        <input type="hidden" id="currentStep" value="1" />

        <div class="form-card">
          <section id="step-1">
            <div class="form-grid">
              <div class="form-group">
                <label for="nomePaciente"
                  >Nome do Paciente<span class="required">*</span></label
                >
                <input
                  type="text"
                  id="nomePaciente"
                  placeholder="Nome completo"
                  data-required="true"
                />
              </div>

              <div class="form-group">
                <label for="dataNascimento"
                  >Data de Nascimento<span class="required">*</span></label
                >
                <input type="date" id="dataNascimento" data-required="true" />
              </div>

              <div class="form-group">
                <label for="sexoBiologico"
                  >Sexo Biológico<span class="required">*</span></label
                >
                <select id="sexoBiologico" data-required="true">
                  <option value="" selected>Selecione</option>
                  <option value="Feminino">Feminino</option>
                  <option value="Masculino">Masculino</option>
                </select>
              </div>

              <div class="form-group">
                <label for="nomeMae"
                  >Nome da Mãe<span class="required">*</span></label
                >
                <input
                  type="text"
                  id="nomeMae"
                  placeholder="Nome completo"
                  data-required="true"
                />
              </div>

              <div class="form-group">
                <label for="nomePai">Nome do Pai</label>
                <input type="text" id="nomePai" placeholder="Nome completo" />
              </div>
            </div>
          </section>

          <section id="step-2" hidden>
            <div class="form-grid">
              <div class="form-group">
                <label for="responsavel"
                  >Responsável pelo Paciente<span class="required">*</span></label
                >
                <input
                  type="text"
                  id="responsavel"
                  placeholder="Nome do responsável"
                  data-required="true"
                />
              </div>

              <div class="form-group">
                <label for="grauParentesco"
                  >Grau de parentesco com o paciente<span class="required">*</span></label
                >
                <input
                  type="text"
                  id="grauParentesco"
                  placeholder="Ex: Mãe, Pai, Avó, Tutor"
                  data-required="true"
                />
              </div>

              <div class="form-group">
                <label for="cpfResponsavel"
                  >CPF do responsável<span class="required">*</span></label
                >
                <input
                  type="text"
                  id="cpfResponsavel"
                  placeholder="000.000.000-00"
                  maxlength="14"
                  data-required="true"
                />
              </div>
            </div>
          </section>

          <section id="step-3" hidden>
            <div class="form-grid">
              <div class="form-group">
                <label for="cidade"
                  >Cidade<span class="required">*</span></label
                >
                <input type="text" id="cidade" data-required="true" />
              </div>

              <div class="form-group">
                <label for="estado"
                  >Estado<span class="required">*</span></label
                >
                <select id="estado" data-required="true">
                  <option value="" selected>Selecione</option>
                  <option value="AC">AC</option>
                  <option value="AL">AL</option>
                  <option value="AP">AP</option>
                  <option value="AM">AM</option>
                  <option value="BA">BA</option>
                  <option value="CE">CE</option>
                  <option value="DF">DF</option>
                  <option value="ES">ES</option>
                  <option value="GO">GO</option>
                  <option value="MA">MA</option>
                  <option value="MT">MT</option>
                  <option value="MS">MS</option>
                  <option value="MG">MG</option>
                  <option value="PA">PA</option>
                  <option value="PB">PB</option>
                  <option value="PR">PR</option>
                  <option value="PE">PE</option>
                  <option value="PI">PI</option>
                  <option value="RJ">RJ</option>
                  <option value="RN">RN</option>
                  <option value="RS">RS</option>
                  <option value="RO">RO</option>
                  <option value="RR">RR</option>
                  <option value="SC">SC</option>
                  <option value="SP">SP</option>
                  <option value="SE">SE</option>
                  <option value="TO">TO</option>
                </select>
              </div>

              <div class="form-group">
                <label for="pais">País<span class="required">*</span></label>
                <input
                  type="text"
                  id="pais"
                  placeholder="Ex: Brasil"
                  data-required="true"
                />
              </div>
            </div>
          </section>

          <div class="form-actions">
            <button class="btn-secondary" id="btnCancel" type="button">
              Cancelar
            </button>
            <button class="btn-secondary" id="btnPrev" type="button" hidden>
              Voltar
            </button>
            <button class="btn-primary" id="btnNext" type="button">
              Próximo
            </button>
            <button class="btn-primary" id="btnSave" type="button" hidden>
              Salvar Paciente
            </button>
          </div>
        </div>
      </div>
    </main>

    <div class="toast" id="toast"></div>

    <script src="server/home.js"></script>
    <script src="server/cadastroPaciente.js"></script>
  </body>
</html>
