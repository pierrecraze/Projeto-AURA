<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURA | Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="icon" href="favicon.ico">
</head>
<body>

<header>
  <h1 class="titulo">AURA</h1>
  <div class="usuario">
    <span>Dra. Silva</span>
    <div class="foto-perfil">DS</div>
  </div>
</header>

<main>
  <div class="grade">

    <div class="card">
      <div class="card-titulo">Cadastro</div>
      <div class="icone">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="7" r="4"/>
          <path d="M3 21v-1a7 7 0 0 1 10.9-5.8"/>
          <line x1="19" y1="11" x2="19" y2="17"/>
          <line x1="16" y1="14" x2="22" y2="14"/>
        </svg>
      </div>
    </div>


    <div class="card">
      <div class="card-titulo">Pacientes</div>
      <div class="icone">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="3"/>
          <path d="M9 9h6M9 13h4M9 17h5"/>
          <circle cx="6" cy="9" r="1" fill="currentColor"/>
          <circle cx="6" cy="13" r="1" fill="currentColor"/>
          <circle cx="6" cy="17" r="1" fill="currentColor"/>
        </svg>
      </div>
    </div>


    <div class="grafico">
      <div class="grafico-titulo">Indicação ao teste FMR1</div>
      <div class="pizza-bloco">
        <div class="pizza-container">
          <svg viewBox="0 0 180 180">
            <path d="M90,90 L90,10 A80,80 0 1,1 43.8,157.8 Z" fill="#F5C842"/>
            <path d="M90,90 L43.8,157.8 A80,80 0 0,1 90,10 Z" fill="#C49A45"/>
            <circle cx="90" cy="90" r="46" fill="white"/>
          </svg>
          <div class="pizza-centro">
            <span class="pizza-pct">64%</span>
            <span class="pizza-sub">Recom.</span>
          </div>
        </div>


        <div class="legenda">
          <div class="legenda-item">
            <div class="legenda-cor" style="background:#F5C842"></div>
            <span class="legenda-nome">Recomendados</span>
            <span class="legenda-pct">64%</span>
          </div>
          <div class="legenda-item">
            <div class="legenda-cor" style="background:#C49A45"></div>
            <span class="legenda-nome">Não recomendados</span>
            <span class="legenda-pct">36%</span>
          </div>
        </div>
      </div>
    </div>



    <div class="card-relatorios">
      <div class="card-relatorios-titulo">Histórico de Relatórios e Avaliação</div>
      <div class="icone">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="8" y1="13" x2="16" y2="13"/>
          <line x1="8" y1="17" x2="12" y2="17"/>
        </svg>
      </div>
    </div>



    <div class="lista">
      <div class="lista-topo">
        <span class="lista-titulo">Recentes</span>
        <span class="lista-link">Ver todos →</span>
      </div>
      <div class="paciente">
        <div class="paciente-foto-perfil" style="background:#4A90C4">FP</div>
        <span class="paciente-nome">Fulano Primeiro</span>
        <span class="paciente-idade">34 anos</span>
        <span class="etiqueta sim">Recom.</span>
      </div>
      <div class="paciente">
        <div class="paciente-foto-perfil" style="background:#C49A45">FS</div>
        <span class="paciente-nome">Fulano Segundo</span>
        <span class="paciente-idade">8 anos</span>
        <span class="etiqueta nao">Não recom.</span>
      </div>
      <div class="paciente">
        <div class="paciente-foto-perfil" style="background:#6EBE8A">FT</div>
        <span class="paciente-nome">Fulano Terceiro</span>
        <span class="paciente-idade">12 anos</span>
        <span class="etiqueta sim">Recom.</span>
      </div>
    </div>

  </div>
</main>

</body>
</html>
