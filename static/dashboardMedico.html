<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AURA | Painel</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/home.css" />

  <link rel="icon" href="favicon.ico">
</head>
<body>

  <header>
    <a href="index.html" class="header-brand" title="Ir para home">
      <div class="logo-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 3c0 4 12 3 12 9S6 18 6 21M18 3C18 7 6 6 6 12s12 6 12 9"
                stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        </svg>
      </div>
      <span class="logo-text">AURA</span>
    </a>

    <div class="header-right">
      <span class="header-sub">Instituto Buko Kaesemodel</span>
      <div class="header-user">
        <div class="user-avatar" aria-hidden="true">DR</div>
        <div class="user-info">
          <span class="user-name">Dr. Lionel Aura</span>
          <span class="user-role">Profissional de Saúde</span>
        </div>
      </div>
      <button class="btn-logout" id="btnLogout" aria-label="Encerrar sessão">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sair
      </button>
    </div>
  </header>

  <div class="session-banner" id="sessionBanner" role="alert" aria-live="assertive">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="10"/>
      <polyline points="12 6 12 12 16 14"/>
    </svg>
    <span>Sua sessão expira em <strong id="sessionCountdown">2:00</strong>. Deseja continuar?</span>
    <button class="btn-session-keep" id="btnKeepSession">Continuar sessão</button>
  </div>

  <!-- PAINEL PRINCIPAL -->
  <div id="page-home">
    <main>
      <div class="dashboard">

        <section class="welcome-row">
          <div>
            <h1 class="welcome-title" id="welcomeTitle">Bem-vindo(a).</h1>
            <p class="welcome-sub">Aqui está o resumo das suas atividades na plataforma AURA.</p>
          </div>
        </section>

        <section class="metrics-grid" aria-label="Ações rápidas">

          <button class="metric-card metric-card--btn" onclick="window.location.href='todosPacientes.html'">
            <div class="metric-icon metric-icon--blue" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </div>
            <div class="metric-body">
              <span class="metric-label">Lista total de pacientes</span>
              <span class="metric-value">38</span>
              <span class="metric-trend trend-up">+3 este mês</span>
            </div>
          </button>

          <button class="metric-card metric-card--btn" onclick="window.location.href='estatisticasPacientes.html'">
            <div class="metric-icon metric-icon--teal" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
              </svg>
            </div>
            <div class="metric-body">
              <span class="metric-label">Estatísticas</span>
              <span class="metric-value" id="metricAvaliacoes">—</span>
              <span class="metric-trend trend-up">avaliações este mês</span>
            </div>
          </button>

          <button class="metric-card metric-card--btn" onclick="window.location.href='relatoriosPacientes.html'">
            <div class="metric-icon metric-icon--purple" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
                <polyline points="10 9 9 9 8 9"/>
              </svg>
            </div>
            <div class="metric-body">
              <span class="metric-label">Avaliações</span>
              <span class="metric-value" id="metricRelatorios">—</span>
              <span class="metric-trend trend-neutral">registradas na plataforma</span>
            </div>
          </button>

          <div class="metric-actions">
            <button class="btn-action btn-secondary" id="btnSearch">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              Buscar paciente
            </button>
            <button class="btn-action btn-primary" id="btnNewPatient" onclick="window.location.href='cadastroPaciente.html'">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <line x1="19" y1="8" x2="19" y2="14"/>
                <line x1="22" y1="11" x2="16" y2="11"/>
              </svg>
              Novo paciente
            </button>
          </div>

        </section>

        <section class="panel" aria-labelledby="recent-title">
          <div class="panel-header">
            <h2 id="recent-title">Pacientes recentes</h2>
            <a href="todosPacientes.html" class="panel-link">Ver todos</a>
          </div>

          <div class="search-bar-wrap" id="searchWrap" hidden>
            <div class="search-bar">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
              </svg>
              <input type="search" id="searchInput" placeholder="Buscar por nome ou CPF…" aria-label="Buscar paciente por nome ou CPF" />
            </div>
          </div>

          <table class="patient-table" aria-label="Lista de pacientes recentes">
            <thead>
              <tr>
                <th scope="col">Paciente</th>
                <th scope="col">Nascimento</th>
                <th scope="col">Sexo</th>
                <th scope="col">Última avaliação</th>
                <th scope="col">Ações</th>
              </tr>
            </thead>
            <tbody id="patientTableBody">
            </tbody>
          </table>

          <p class="table-empty" id="tableEmpty" hidden>Nenhum paciente encontrado.</p>
        </section>

      </div>
    </main>
  </div>

  <script src="/server/home.js"></script>
  <script>
    const btnSearch   = document.getElementById('btnSearch');
    const searchWrap  = document.getElementById('searchWrap');
    const searchInput = document.getElementById('searchInput');
    let rows          = document.querySelectorAll('#patientTableBody tr');
    const tableEmpty  = document.getElementById('tableEmpty');

    btnSearch.addEventListener('click', () => {
      const isHidden = searchWrap.hidden;
      searchWrap.hidden = !isHidden;
      if (isHidden) searchInput.focus();
    });

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.toLowerCase().trim();
      let visible = 0;
      rows.forEach(row => {
        const name = row.querySelector('span')?.textContent.toLowerCase() ?? '';
        const match = q === '' || name.includes(q);
        row.hidden = !match;
        if (match) visible++;
      });
      tableEmpty.hidden = visible > 0;
    });

    function exibirSaudacao() {
      const dados = JSON.parse(localStorage.getItem('aura_user') || 'null');
      const titulo = document.getElementById('welcomeTitle');
      if (!titulo) return;

      const hora = new Date().getHours();
      const periodo = hora < 12 ? 'Bom dia' : hora < 18 ? 'Boa tarde' : 'Boa noite';
      const nome = dados?.nome ? `, ${dados.nome}` : '';
      titulo.textContent = `${periodo}${nome}.`;
    }

    async function carregarDadosDashboard() {
      try {
        const token = localStorage.getItem('aura_token');
        const res = await fetch('/api/pacientes/', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
          const pacientes = await res.json();
          const ativos = pacientes.filter(p => !p.deletado_em);
          
          const metricTotal = document.querySelector('.metric-card:nth-child(1) .metric-value');
          if (metricTotal) metricTotal.textContent = ativos.length;

          const tbody = document.getElementById('patientTableBody');
          tbody.innerHTML = '';
          const recentes = ativos.slice(-5).reverse(); 
          recentes.forEach(p => {
            const d = (p.dataNascimento || p.data_nascimento || '').split('-');
            const dateBr = d.length === 3 ? `${d[2]}/${d[1]}/${d[0]}` : '-';
            const isM = (p.sexoBiologico || p.sexo_biologico) === 'M';
            const badgeClass = isM ? 'badge--m' : 'badge--f';
            const badgeText = isM ? 'Masculino' : 'Feminino';
            const inic = p.nome ? p.nome.split(' ').slice(0,2).map(n=>n[0]).join('').toUpperCase() : 'PA';

            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td><div class="patient-cell"><div class="patient-avatar" aria-hidden="true">${inic}</div><span>${p.nome}</span></div></td>
              <td>${dateBr}</td><td><span class="badge ${badgeClass}">${badgeText}</span></td><td>-</td>
              <td class="actions-cell">
                <button class="btn-icon" title="Nova avaliação" onclick="window.location.href='formulario.html?paciente_id=${p.id}'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                <button class="btn-icon" title="Histórico" onclick="window.location.href='paciente.html?id=${p.id}'"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></button>
              </td>
            `;
            tbody.appendChild(tr);
          });
          rows = document.querySelectorAll('#patientTableBody tr');
          tableEmpty.hidden = recentes.length > 0;
        }
      } catch(e) { console.error(e); }
    }

    async function carregarMetricasTriagens() {
      try {
        const token = localStorage.getItem('aura_token');
        const res = await fetch('/api/triagens/', {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) return;

        const triagens = await res.json();
        const agora = new Date();
        const esteMes = triagens.filter(t => {
          const d = new Date(t.data_hora);
          return d.getMonth() === agora.getMonth() && d.getFullYear() === agora.getFullYear();
        });

        const metricAvaliacoes = document.getElementById('metricAvaliacoes');
        if (metricAvaliacoes) metricAvaliacoes.textContent = esteMes.length;

        const metricRelatorios = document.getElementById('metricRelatorios');
        if (metricRelatorios) metricRelatorios.textContent = triagens.length;
      } catch (e) { console.error(e); }
    }

    exibirSaudacao();
    carregarDadosDashboard();
    carregarMetricasTriagens();
</script>
</body>
</html>
